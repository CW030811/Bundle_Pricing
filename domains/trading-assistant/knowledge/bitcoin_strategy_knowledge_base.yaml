- id: btc_eth_cointegration_pairs
  name: BTC/ETH cointegration pairs mean reversion
  family: statistical_arbitrage
  priority: medium
  implementation_status: implemented_research
  implemented_as: btc_eth_cointegration_pairs
  report_name: btc_eth_cointegration_pairs
  source_type: research_paper
  sources:
  - title: Constructing Cointegrated Cryptocurrency Portfolios for Statistical Arbitrage
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=3235890
  - title: Statistical arbitrage strategies using cointegration analysis in cryptocurrency
    url: https://ijsra.net/sites/default/files/fulltext_pdf/IJSRA-2026-0283.pdf
  logic: Trade deviations of a cointegrated BTC/ETH or crypto basket spread from its
    equilibrium.
  data_requirements:
  - synchronized BTC/ETH OHLCV
  - cointegration test window
  - fees/slippage
  signal_construction: rolling hedge ratio and spread z-score.
  entry_rules: Long spread below negative z threshold, short spread above positive
    threshold.
  exit_rules: Exit near zero z-score or when cointegration breaks.
  position_sizing: Dollar-neutral hedge-ratio sizing with gross exposure cap.
  risk_management:
  - cointegration p-value guard
  - spread stop
  - gross leverage cap
  suitable_market_regimes:
  - stable BTC/ETH relationship
  - mean-reverting relative value
  failure_conditions:
  - structural regime break
  - exchange-specific dislocation
  - borrow/margin constraints
  reproducibility_difficulty: medium
  backtest_status: partial
  research_pipeline_stage: strategy_research
  factor_pipeline_status: factor_pipeline_pending
  strategy_pipeline_status: strategy_backtested_partial
  promotion_status: research_only
  pipeline_notes: Reproduced as independent pairs research; needs walk-forward,
    cointegration stability gates, and factor-style spread diagnostics.
  recommendation: Reproduced as a research backtest with rolling hedge ratio, z-score
    spread signals, confirmed candles, next-bar-open execution, fees and slippage;
    add walk-forward cointegration stability gates before paper/live use.
