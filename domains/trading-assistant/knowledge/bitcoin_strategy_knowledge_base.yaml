version: 1
updated_at: '2026-05-28'
scope: Bitcoin and BTC-adjacent cryptocurrency quantitative strategies
selection_principles:
- Prefer clear economic logic over opaque curve fitting.
- Prefer data available from OKX/public OHLCV/funding/order book feeds.
- Require confirmed candles and next-bar execution in backtests.
- Track fees, slippage, regime behavior, failure modes, and reproducibility difficulty.
strategies:
- id: btc_time_series_momentum
  name: Bitcoin time-series momentum / trend following
  family: trend_following
  priority: high
  implementation_status: implemented_single_asset
  implemented_as: trend_mr
  report_name: strategy_sweep
  source_type: research_paper
  sources:
  - title: A Decade of Evidence of Trend Following Investing in Cryptocurrencies
    url: https://arxiv.org/abs/2009.12155
  - title: Dynamic time series momentum of cryptocurrencies
    url: https://www.sciencedirect.com/science/article/pii/S1062940821000590
  logic: Go long BTC when medium-term returns or moving-average trend are positive;
    stay flat or short only where instrument rules allow.
  data_requirements:
  - BTC/USDT OHLCV
  - confirmed candles
  - fee schedule
  signal_construction: EMA/return trend filter; optional RSI overbought guard.
  entry_rules: Enter long after trend confirmation on a closed bar; execute next bar.
  exit_rules: Exit when trend turns neutral/negative or risk breaker fires.
  position_sizing: Target percentage capped by risk config; volatility adjustment
    is recommended for production.
  risk_management:
  - max symbol exposure
  - daily loss cap
  - drawdown breaker
  - kill switch
  suitable_market_regimes:
  - persistent bull trends
  - post-breakout drift
  failure_conditions:
  - sideways chop
  - fee-heavy whipsaws
  - late trend reversals
  reproducibility_difficulty: low
  backtest_status: partial
  research_pipeline_stage: strategy_research
  factor_pipeline_status: factor_pipeline_ready
  strategy_pipeline_status: strategy_backtested_partial
  promotion_status: baseline_only
  pipeline_notes: Migrated to FactorBuilder as btc_time_series_momentum_336h for
    baseline IC screening; strategy remains a baseline rather than paper candidate.
  recommendation: Keep as baseline; compare against buy-and-hold and adaptive trend.
- id: crypto_cross_sectional_momentum
  name: Cross-sectional crypto momentum
  family: cross_sectional_momentum
  priority: high
  implementation_status: implemented_portfolio
  implemented_as: cross_sectional_momentum
  report_name: cross_sectional_momentum_walk_forward
  source_type: research_paper
  sources:
  - title: 'Momentum in the Cryptocurrency Market: A Comprehensive Analysis under
      Realistic Assumptions'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4675565
  - title: Cryptocurrencies and momentum
    url: https://www.sciencedirect.com/science/article/pii/S0165176519301077
  logic: Rank liquid crypto assets by past return and hold the strongest names; BTC
    is part of the comparison universe.
  data_requirements:
  - multi-asset OHLCV
  - liquidity filter
  - confirmed candles
  signal_construction: lookback return rank across symbols.
  entry_rules: Buy top ranked symbols after rebalance close.
  exit_rules: Exit symbols falling out of the selected set or when circuit breakers
    fire.
  position_sizing: Equal or capped allocation across top N, constrained by max symbol
    exposure and turnover budget.
  risk_management:
  - turnover cap
  - rebalance cooldown
  - stale data guard
  - portfolio drawdown breaker
  suitable_market_regimes:
  - dispersion
  - rotational alt rallies
  - broad risk-on trends
  failure_conditions:
  - sharp reversals
  - crowded momentum unwind
  - thin/liquidity-fragmented names
  reproducibility_difficulty: medium
  backtest_status: walk_forward_and_costs_done
  research_pipeline_stage: strategy_research
  factor_pipeline_status: factor_pipeline_ready
  strategy_pipeline_status: strategy_validated
  promotion_status: primary_paper_candidate
  pipeline_notes: Migrated to FactorBuilder as cross_sectional_momentum_720h;
    remains the strongest strategy-level candidate after walk-forward and cost validation.
  recommendation: Current primary paper strategy; require clean 24h+ service window
    before live consideration.
