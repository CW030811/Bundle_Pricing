- id: donchian_breakout_btc
  name: Donchian channel breakout on BTC
  family: breakout
  priority: medium
  implementation_status: implemented_single_asset
  implemented_as: donchian_breakout
  report_name: strategy_sweep
  source_type: foundational_rule
  sources:
  - title: Classic Donchian/Turtle-style breakout rule
    url: https://en.wikipedia.org/wiki/Donchian_channel
  logic: Buy BTC when close breaks above prior N-bar high; exit on shorter low channel.
  data_requirements:
  - BTC/USDT OHLCV
  signal_construction: prior high/low channel excluding current bar.
  entry_rules: Close above previous lookback high.
  exit_rules: Close below exit channel low or risk stop.
  position_sizing: ATR or fixed risk fraction; current implementation uses target
    exposure.
  risk_management:
  - ATR stop candidate
  - max exposure
  - fee/slippage model
  suitable_market_regimes:
  - breakout trends
  - post-consolidation expansion
  failure_conditions:
  - false breakouts
  - range-bound markets
  reproducibility_difficulty: low
  backtest_status: partial
  research_pipeline_stage: strategy_research
  factor_pipeline_status: factor_pipeline_ready
  strategy_pipeline_status: strategy_backtested_partial
  promotion_status: research_only
  pipeline_notes: Implemented as a single-asset technical strategy; needs BTC-only
    factor/backtest normalization before promotion.
  recommendation: Re-run BTC-only with ATR sizing and regime split.
- id: rsi_bollinger_btc_reversion
  name: BTC RSI + Bollinger mean reversion
  family: mean_reversion
  priority: medium
  implementation_status: implemented_single_asset
  implemented_as: rsi_bollinger_reversion
  report_name: strategy_sweep
  source_type: technical_blog_pattern
  sources:
  - title: RSI and Bollinger Bands technical-analysis family
    url: https://www.frontiersin.org/journals/big-data/articles/10.3389/fdata.2024.1369895/pdf
  logic: Buy oversold BTC when price is below lower band and RSI is weak; exit on
    normalization.
  data_requirements:
  - BTC/USDT OHLCV
  signal_construction: RSI plus Bollinger z-score style filter.
  entry_rules: Close below lower band and RSI below threshold.
  exit_rules: Return to neutral band, overbought condition, or risk stop.
  position_sizing: Small fixed target exposure; avoid leverage.
  risk_management:
  - trend filter recommended
  - max daily loss
  - stop after consecutive losses
  suitable_market_regimes:
  - sideways volatile markets
  - liquidity flush mean reversion
  failure_conditions:
  - crash continuation
  - bear trend knife-catching
  reproducibility_difficulty: low
  backtest_status: partial
  research_pipeline_stage: strategy_research
  factor_pipeline_status: factor_pipeline_pending
  strategy_pipeline_status: strategy_backtested_partial
  promotion_status: research_only
  pipeline_notes: Implemented as a single-asset technical strategy; mean-reversion
