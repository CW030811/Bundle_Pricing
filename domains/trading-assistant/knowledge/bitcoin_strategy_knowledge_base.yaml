- id: external_alpha_factor_ensemble
  name: External alpha factor transform ensemble
  family: factor_ensemble
  priority: medium
  implementation_status: implemented_research
  implemented_as: alpha_ensemble
  report_name: alpha_ensemble
  source_type: external_strategy_package
  sources:
  - title: Crypto CTA factor transform package review
    url: local_zip_review
  logic: Convert reusable price, funding, or external alpha factors into bounded
    CTA-style signals through rolling transforms, then average strategy variants
    inside groups and combine groups by explicit research weights.
  data_requirements:
  - confirmed OKX candles for tradable forward returns
  - platform factor values or external CSV values with ts, symbol, factor
  - fee and slippage assumptions
  signal_construction: Apply ma_diff, z_score, minmax, robust_scaling, box_cox,
    or rate_of_change transforms to factor values with explicit window, threshold,
    style, and position type.
  entry_rules: Research-only signal rows are evaluated against forward tradable
    returns; no direct entry routing is enabled.
  exit_rules: Research-only exits are implicit when transformed signal returns to
    zero or flips sign.
  position_sizing: Group signals are equal-weighted internally and combined by
    explicit YAML group weights; no optimizer is used.
  risk_management:
  - research-only promotion gate
  - confirmed data requirement
  - explicit group weights
  - existing live gate required before any future promotion
  suitable_market_regimes:
  - regimes where alternative factors retain stable predictive content
  - diversified factor environments
  failure_conditions:
  - parameter overfitting
  - stale or malformed external factor data
  - weak walk-forward stability
  reproducibility_difficulty: medium
  backtest_status: partial
  research_pipeline_stage: factor_research
  factor_pipeline_status: factor_pipeline_ready
  strategy_pipeline_status: research_only
  promotion_status: research_only
  pipeline_notes: Added as a research bridge for external alpha packages; it must
    pass walk-forward, cost sensitivity, shortlist, paper stability, and operator
    gates before any live consideration.
  recommendation: Use for alpha discovery and diagnostics only; do not wire into
    paper/live defaults until separate promotion evidence exists.
